<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('virelix_selected_theme');
          if (!theme) {
            var cache = localStorage.getItem('site_settings_cache_v1');
            if (cache) {
              theme = JSON.parse(cache).home_theme;
            }
          }
          if (theme) {
            document.documentElement.setAttribute('data-theme', theme);
          } else {
            document.documentElement.setAttribute('data-theme', 'editorial');
          }
        } catch (e) {}
      })();
    </script>
